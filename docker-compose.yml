services:
  postgres:
    image: postgres:16-alpine
    container_name: kassa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kassa
      POSTGRES_PASSWORD: kassa_secret
      POSTGRES_DB: kassa_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
